version: '3.8'

services:

  # ─────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: eduflex-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - eduflex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # User Service
  # ─────────────────────────────────────────
  user-service:
    image: shamal01/eduflex-user-service:latest
    container_name: eduflex-user-service
    environment:
      - PORT=4001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "4001:4001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eduflex-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Course Service (ready for when you build it)
  # ─────────────────────────────────────────
  course-service:
    image: shamal01/eduflex-course-service:latest
    container_name: eduflex-course-service
    environment:
      - PORT=4002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "4002:4002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eduflex-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  api-gateway:
    image: shamal01/eduflex-api-gateway:latest
    container_name: eduflex-api-gateway
    environment:
      - PORT=3000
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-service:4001
      - COURSE_SERVICE_URL=http://course-service:4002
      - ASSIGNMENT_SERVICE_URL=http://assignment-service:4003
      - GRADE_SERVICE_URL=http://grade-service:4004
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - course-service
    networks:
      - eduflex-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Frontend (React)
  # ─────────────────────────────────────────
  frontend:
    image: shamal01/eduflex-frontend:latest
    container_name: eduflex-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - eduflex-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  eduflex-network:
    driver: bridge