version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: eduflex-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eduflex
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - eduflex-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: eduflex-user-service
    environment:
      - PORT=4001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=eduflex
      - JWT_SECRET=your_jwt_secret
    ports:
      - "4001:4001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eduflex-network
    restart: unless-stopped

  # Course Service
  course-service:
    build:
      context: ./services/course-service
      dockerfile: Dockerfile
    container_name: eduflex-course-service
    environment:
      - PORT=4002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=eduflex
    ports:
      - "4002:4002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eduflex-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: eduflex-api-gateway
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:4001
      - COURSE_SERVICE_URL=http://course-service:4002
      - JWT_SECRET=your_jwt_secret
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - course-service
    networks:
      - eduflex-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduflex-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - eduflex-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  eduflex-network:
    driver: bridge