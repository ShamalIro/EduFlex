name: EduFlex CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: BUILD & PUSH DOCKER IMAGES
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # BUILD & PUSH FRONTEND
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduflex-frontend:latest

      # BUILD & PUSH API GATEWAY
      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduflex-api-gateway:latest

      # BUILD & PUSH USER SERVICE
      - name: Build & Push UserService
        uses: docker/build-push-action@v5
        with:
          context: ./services/UserService
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduflex-user-service:latest

  # ─────────────────────────────────────────
  # JOB 2: DEPLOY TO EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf"
          target: "/home/ubuntu/eduflex"

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/eduflex

            # Login to DockerHub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/eduflex-frontend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/eduflex-api-gateway:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/eduflex-user-service:latest

            # Stop old containers and start new ones
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old unused images
            docker image prune -f

            echo "✅ Deployment complete!"